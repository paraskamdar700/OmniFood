<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 110" role="img" aria-labelledby="title desc">
  <title id="title">Omnifood Logo</title>
  <desc id="desc">Wordmark logo with leaf icon and Omnifood text.</desc>
  <defs>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#51cf66" />
      <stop offset="100%" stop-color="#2f9e44" />
    </linearGradient>
  </defs>

  <rect width="420" height="110" fill="none" />
  <g transform="translate(10 15)">
